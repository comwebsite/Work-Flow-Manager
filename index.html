<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Flow Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Базовые стили и переменные */
        :root {
            --primary: #1e293b;
            --secondary: #3b82f6;
            --accent: #f59e0b;
            --bg-body: #f1f5f9;
            --bg-card: #ffffff;
            --text-main: #334155;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            --border-drawn: 255px 15px 225px 15px/15px 225px 15px 255px;
            --transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Анимации появления */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Шапка сайта */
        header {
            background: linear-gradient(135deg, var(--primary), #0f172a);
            color: white;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-wf {
            font-family: 'Caveat', cursive;
            font-size: 2.5rem;
            color: var(--accent);
            border: 2px solid var(--accent);
            border-radius: var(--border-drawn);
            padding: 5px 15px;
            transform: rotate(-3deg);
            transition: var(--transition);
        }

        .logo-wf:hover {
            transform: rotate(0deg) scale(1.05);
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.5);
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .version {
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Основная сетка */
        main {
            padding: 40px 5%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        section {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 25px;
            box-shadow: var(--shadow);
            border-top: 5px solid var(--secondary);
            animation: fadeInUp 0.8s ease backwards;
            transition: var(--transition);
        }

        section:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15);
        }

        section:nth-child(1) { animation-delay: 0.1s; grid-column: 1 / -1; }
        section:nth-child(2) { animation-delay: 0.2s; }
        section:nth-child(3) { animation-delay: 0.3s; }
        section:nth-child(4) { animation-delay: 0.4s; grid-column: 1 / -1; }

        h2 {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
            display: flex;
            align-items: center;
        }

        /* Карта Windy */
        .map-container {
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #cbd5e1;
        }

        /* Таймер Pomodoro */
        .pomodoro-settings {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .pomodoro-settings input {
            width: 80px;
            text-align: center;
            font-weight: bold;
        }

        .pomodoro-display {
            font-size: 4rem;
            font-weight: 700;
            text-align: center;
            color: var(--primary);
            margin: 10px 0 20px;
            font-family: monospace;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        button {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            outline: none;
        }

        button:hover {
            background: #2563eb;
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4);
        }

        button.btn-danger { background: #ef4444; }
        button.btn-danger:hover { background: #dc2626; box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4); }
        
        button.btn-success { background: #10b981; }
        button.btn-success:hover { background: #059669; box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4); }

        button.btn-edit { background: #f59e0b; }
        button.btn-edit:hover { background: #d97706; box-shadow: 0 5px 15px rgba(245, 158, 11, 0.4); }

        /* Задачи */
        .task-controls {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr auto;
            gap: 10px;
            margin-bottom: 20px;
        }

        input, select {
            padding: 10px 15px;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            transition: var(--transition);
            width: 100%;
            background: #f8fafc;
        }

        input:focus, select:focus {
            border-color: var(--secondary);
            background: white;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .task-list {
            list-style: none;
            max-height: 350px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .task-item {
            background: #f8fafc;
            border-left: 4px solid var(--secondary);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeInUp 0.4s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: var(--transition);
            gap: 15px;
        }

        .task-item:hover {
            background: white;
            transform: translateX(5px);
        }

        .task-priority-high { border-left-color: #ef4444; }
        .task-priority-medium { border-left-color: #f59e0b; }
        .task-priority-low { border-left-color: #10b981; }

        .task-completed {
            opacity: 0.6;
            background: #e2e8f0;
            border-left-color: #94a3b8 !important;
        }

        .task-completed .task-title {
            text-decoration: line-through;
            color: #64748b;
        }

        .task-info {
            flex-grow: 1;
        }

        .task-title {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .task-meta {
            font-size: 0.8rem;
            color: #64748b;
        }

        .task-actions {
            display: flex;
            gap: 5px;
        }

        .task-actions button {
            padding: 6px 10px;
            font-size: 0.8rem;
        }

        /* Бланк наблюдений (В СТОЛБИК) */
        .form-column {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 600px; /* Ограничиваем ширину, чтобы не растягивалось на весь экран */
            margin: 0 auto; /* Центрируем форму */
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--primary);
        }

        .form-group input[readonly] {
            background: #e2e8f0;
            cursor: not-allowed;
            color: #475569;
            font-weight: bold;
        }

        .submit-btn {
            margin-top: 15px;
            background: var(--accent);
            color: var(--primary);
            font-size: 1.1rem;
            padding: 15px;
            border-radius: var(--border-drawn);
            border: 2px solid var(--primary);
            width: 100%;
        }

        .submit-btn:hover {
            background: #d97706;
            color: white;
        }

        /* Подвал */
        footer {
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            font-size: 0.9rem;
        }

        /* Скроллбар */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Адаптивность для телефонов */
        @media (max-width: 1024px) {
            .task-controls { grid-template-columns: 1fr 1fr; }
            .task-controls button { grid-column: 1 / -1; }
        }
        
        @media (max-width: 768px) {
            main { grid-template-columns: 1fr; }
            .task-controls { grid-template-columns: 1fr; }
            header { flex-direction: column; gap: 15px; text-align: center; }
            .pomodoro-display { font-size: 3rem; }
            .task-item { flex-direction: column; align-items: flex-start; }
            .task-actions { width: 100%; justify-content: space-between; margin-top: 10px; }
            .form-column { max-width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <span class="logo-wf">WF</span>
            <span class="logo-text">Manager</span>
        </div>
        <div class="version">Version 5.0</div>
    </header>

    <main>
        <section>
            <h2>Метеокарта (Windy)</h2>
            <div class="map-container">
                <iframe width="100%" height="600" src="https://embed.windy.com/embed.html?type=map&location=coordinates&metricRain=mm&metricTemp=°C&metricWind=m/s&zoom=5&overlay=wind&product=ecmwf&level=surface" frameborder="0"></iframe>
            </div>
        </section>

        <section>
            <h2>Timer Pomodoro</h2>
            <div class="pomodoro-settings">
                <label for="pomodoro-input">Мин:</label>
                <input type="number" id="pomodoro-input" value="25" min="1" max="120">
                <button onclick="setCustomTime()">Установить</button>
            </div>
            <div class="pomodoro-display" id="timer-display">25:00</div>
            <div class="btn-group">
                <button onclick="startTimer()">Старт</button>
                <button onclick="pauseTimer()">Пауза</button>
                <button class="btn-danger" onclick="resetTimer()">Сброс</button>
            </div>
        </section>

        <section>
            <h2>Менеджер задач</h2>
            <div class="task-controls">
                <input type="text" id="task-name" placeholder="Название задачи">
                <select id="task-priority">
                    <option value="low">Низкий приоритет</option>
                    <option value="medium">Средний приоритет</option>
                    <option value="high">Высокий приоритет</option>
                </select>
                <input type="text" id="task-dep" placeholder="Зависимость (от чего?)">
                <input type="date" id="task-deadline" title="Дедлайн">
                <button onclick="addTask()">Добавить</button>
            </div>
            <ul class="task-list" id="task-list">
                </ul>
        </section>

        <section>
            <h2>Бланк наблюдений</h2>
            <form action="https://formsubmit.co/communityofdevelopingcraftsmen@gmail.com" method="POST" class="form-column">
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_subject" value="Новый бланк наблюдений WF Manager">
                
                <div class="form-group">
                    <label>Дата</label>
                    <input type="text" name="Дата" id="auto-date" readonly required>
                </div>
                <div class="form-group">
                    <label>Время</label>
                    <input type="text" name="Время" id="auto-time" readonly required>
                </div>
                <div class="form-group">
                    <label>Микрорайон</label>
                    <input type="text" name="Микрорайон" placeholder="Введите микрорайон" required>
                </div>
                <div class="form-group">
                    <label>Температура (°C)</label>
                    <input type="text" name="Температура" placeholder="Только цифры и .,;:" oninput="restrictInput(this)" required>
                </div>
                <div class="form-group">
                    <label>Влажность (%)</label>
                    <input type="text" name="Влажность" placeholder="Только цифры и .,;:" oninput="restrictInput(this)" required>
                </div>
                <div class="form-group">
                    <label>Погода</label>
                    <select name="Погода" required>
                        <option value="" disabled selected>Выберите погоду</option>
                        <option value="Ясно">Ясно</option>
                        <option value="Засуха">Засуха</option>
                        <option value="Туман">Туман</option>
                        <option value="Облачно">Облачно</option>
                        <option value="Пасмурно">Пасмурно</option>
                        <option value="Дождь">Дождь</option>
                        <option value="Гроза">Гроза</option>
                        <option value="Град">Град</option>
                        <option value="Снег">Снег</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Ветер</label>
                    <select name="Ветер" required>
                        <option value="" disabled selected>Выберите ветер</option>
                        <option value="Нейтральный">Нейтральный</option>
                        <option value="Слабый">Слабый</option>
                        <option value="Легкий">Легкий</option>
                        <option value="Умеренный">Умеренный</option>
                        <option value="Свежий ветер">Свежий ветер</option>
                        <option value="Сильный ветер">Сильный ветер</option>
                        <option value="Шторм">Шторм</option>
                        <option value="Ураган">Ураган</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Kt</label>
                    <input type="text" name="Kt" placeholder="Только цифры и .,;:" oninput="restrictInput(this)" required>
                </div>
                <div class="form-group">
                    <label>Выполняет работу (ФИО)</label>
                    <input type="text" name="Исполнитель" placeholder="По желанию">
                </div>
                <div class="form-group">
                    <label>Устройство</label>
                    <select name="Устройство" required>
                        <option value="" disabled selected>Выберите устройство</option>
                        <option value="Смартфон">Смартфон</option>
                        <option value="Планшет">Планшет</option>
                        <option value="Компьютер">Компьютер</option>
                    </select>
                </div>
                
                <button type="submit" class="submit-btn">Отправить бланк</button>
            </form>
        </section>
    </main>

    <footer>
        © Все права защищены
    </footer>

    <script>
        // --- 1. Pomodoro Timer Logic ---
        let timerInterval;
        let defaultTime = 25 * 60; // По умолчанию 25 минут
        let timeLeft = defaultTime;
        let isRunning = false;
        const display = document.getElementById('timer-display');

        function updateDisplay() {
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;
            display.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function setCustomTime() {
            if (isRunning) {
                alert('Сначала поставьте таймер на паузу!');
                return;
            }
            const inputMinutes = parseInt(document.getElementById('pomodoro-input').value);
            if (inputMinutes > 0) {
                defaultTime = inputMinutes * 60;
                timeLeft = defaultTime;
                updateDisplay();
            } else {
                alert('Введите корректное время больше 0');
            }
        }

        function startTimer() {
            if (!isRunning) {
                isRunning = true;
                timerInterval = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateDisplay();
                    } else {
                        clearInterval(timerInterval);
                        isRunning = false;
                        alert('Время вышло! Пора сделать перерыв или сменить задачу.');
                    }
                }, 1000);
            }
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            isRunning = false;
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            timeLeft = defaultTime;
            updateDisplay();
        }

        // Инициализация отображения таймера
        updateDisplay();

        // --- 2. Task Manager Logic ---
        function addTask() {
            const nameInput = document.getElementById('task-name');
            const priority = document.getElementById('task-priority').value;
            const depInput = document.getElementById('task-dep');
            const deadlineInput = document.getElementById('task-deadline');
            
            const name = nameInput.value.trim();
            const dep = depInput.value.trim();
            const deadline = deadlineInput.value;
            
            if (!name) {
                alert('Введите название задачи!');
                return;
            }

            const list = document.getElementById('task-list');
            const li = document.createElement('li');
            li.className = `task-item task-priority-${priority}`;
            
            // Форматируем дату дедлайна, если она есть
            let deadlineText = '';
            if (deadline) {
                const d = new Date(deadline);
                deadlineText = ` | Дедлайн: ${d.toLocaleDateString('ru-RU')}`;
            }
            
            li.innerHTML = `
                <div class="task-info">
                    <div class="task-title">${name}</div>
                    <div class="task-meta">
                        Приоритет: ${priority === 'high' ? 'Высокий' : priority === 'medium' ? 'Средний' : 'Низкий'} 
                        ${dep ? `| Зависимость: ${dep}` : ''} 
                        ${deadlineText}
                    </div>
                </div>
                <div class="task-actions">
                    <button class="btn-success" onclick="toggleTask(this)" title="Выполнено">✓</button>
                    <button class="btn-edit" onclick="editTask(this)" title="Редактировать">✎</button>
                    <button class="btn-danger" onclick="this.closest('.task-item').remove()" title="Удалить">✕</button>
                </div>
            `;
            
            list.appendChild(li);
            
            // Очистка инпутов
            nameInput.value = '';
            depInput.value = '';
            deadlineInput.value = '';
        }

        function toggleTask(btn) {
            const taskItem = btn.closest('.task-item');
            taskItem.classList.toggle('task-completed');
        }

        function editTask(btn) {
            const taskItem = btn.closest('.task-item');
            const titleElement = taskItem.querySelector('.task-title');
            
            const currentName = titleElement.innerText;
            const newName = prompt('Редактировать задачу:', currentName);
            
            if (newName !== null && newName.trim() !== '') {
                titleElement.innerText = newName.trim();
            }
        }

        // --- 3. Observation Form Logic ---
        // Автозаполнение даты и времени
        function updateDateTime() {
            const now = new Date();
            
            // Формат даты: ДД.ММ.ГГГГ
            const dateStr = now.toLocaleDateString('ru-RU');
            document.getElementById('auto-date').value = dateStr;
            
            // Формат времени: ЧЧ:ММ:СС
            const timeStr = now.toLocaleTimeString('ru-RU');
            document.getElementById('auto-time').value = timeStr;
        }
        
        // Обновляем время каждую секунду, чтобы на момент отправки оно было точным
        updateDateTime();
        setInterval(updateDateTime, 1000);

        // Фильтрация ввода: только цифры и символы . , ; :
        function restrictInput(inputElement) {
            inputElement.value = inputElement.value.replace(/[^0-9.,;:]/g, '');
        }
    </script>
</body>
</html>
