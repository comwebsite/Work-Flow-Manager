<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Flow Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Scandi-Chic, Soft Minimalism & Super-Rounded Palette */
        :root {
            --bg-main: #fcfbf9;
            --bg-card: #ffffff;
            --text-main: #4a4a4a;
            --text-muted: #8c8c8c;
            --accent-craft: #d4c5b9;
            --accent-hover: #c4b3a5;
            --success: #a3b18a;
            --danger: #e07a5f;
            --warning: #f4a261;
            
            /* НОВЫЕ СИММЕТРИЧНЫЕ И БОЛЬШИЕ СКРУГЛЕНИЯ */
            --r-large: 40px;   /* Для секций, карты */
            --r-medium: 25px;  /* Для задач */
            --r-pill: 50px;    /* Для кнопок, инпутов (форма капсулы) */
            
            --shadow-soft: 0 10px 30px rgba(149, 157, 165, 0.06);
            --transition-micro: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); /* Более "живая" анимация */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
            color: var(--text-main);
        }

        body {
            background-color: var(--bg-main);
            background-image: radial-gradient(#e6e4df 1px, transparent 1px);
            background-size: 30px 30px;
            line-height: 1.6;
            overflow-x: hidden;
            padding-bottom: 40px;
        }

        /* Шапка */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 5% 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo-container {
            display: flex;
            align-items: baseline;
            gap: 12px;
        }

        .logo-wf {
            font-family: 'Caveat', cursive;
            font-size: 3rem;
            color: var(--text-main);
            border: 3px solid var(--accent-craft);
            /* Симметричное скругление */
            border-radius: var(--r-large);
            padding: 8px 25px;
            transform: rotate(-3deg);
            transition: var(--transition-micro);
            background: var(--bg-card);
            box-shadow: 2px 4px 0px rgba(212, 197, 185, 0.2);
        }

        .logo-wf:hover {
            transform: rotate(0deg) scale(1.05);
            box-shadow: 0 10px 20px rgba(212, 197, 185, 0.4);
        }

        .logo-text {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: lowercase;
            color: var(--text-muted);
        }

        .version {
            font-family: 'Caveat', cursive;
            font-size: 1.6rem;
            color: var(--warning);
            transform: rotate(2deg);
            background: rgba(244, 162, 97, 0.1);
            padding: 5px 15px;
            border-radius: var(--r-pill);
        }

        /* Сетка секций */
        main {
            padding: 0 5%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            max-width: 1800px;
            margin: 0 auto;
        }

        section {
            background: var(--bg-card);
            /* Скругление секций */
            border-radius: var(--r-large);
            padding: 40px;
            box-shadow: var(--shadow-soft);
            border: 2px solid transparent;
            transition: var(--transition-micro);
        }

        section:hover {
            border-color: #f1ede9;
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(149, 157, 165, 0.1);
        }

        section:nth-child(1), section:nth-child(4) { grid-column: 1 / -1; }

        h2 {
            font-family: 'Caveat', cursive;
            font-size: 2.4rem;
            margin-bottom: 30px;
            position: relative;
            display: inline-block;
        }

        h2::after {
            content: '';
            position: absolute;
            bottom: 7px;
            left: 0;
            width: 100%;
            height: 10px;
            background: var(--accent-craft);
            opacity: 0.3;
            border-radius: var(--r-pill);
        }

        /* Интерактивные элементы (Микровзаимодействия) */
        button, input, select {
            outline: none;
            transition: var(--transition-micro);
        }

        input, select {
            padding: 15px 25px;
            border: 2px solid #f1f1f8;
            /* Форма капсулы */
            border-radius: var(--r-pill);
            background: var(--bg-main);
            font-size: 1rem;
            width: 100%;
        }

        input:focus, select:focus {
            border-color: var(--accent-craft);
            background: var(--bg-card);
            box-shadow: 0 5px 15px rgba(212, 197, 185, 0.2);
        }

        button {
            background: var(--bg-card);
            border: 2px solid var(--accent-craft);
            color: var(--text-main);
            padding: 12px 28px;
            /* Форма капсулы */
            border-radius: var(--r-pill);
            font-weight: 600;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            font-size: 0.95rem;
        }

        button:hover {
            background: var(--accent-craft);
            color: white;
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(212, 197, 185, 0.4);
        }

        button:active { transform: scale(0.97); }

        /* Специфичные кнопки */
        button.btn-danger { border-color: var(--danger); color: var(--danger); }
        button.btn-danger:hover { background: var(--danger); color: white; border-color: var(--danger); }
        
        button.btn-success { border-color: var(--success); color: var(--success); }
        button.btn-success:hover { background: var(--success); color: white; border-color: var(--success); }
        
        button.btn-edit { border-color: var(--warning); color: var(--warning); }
        button.btn-edit:hover { background: var(--warning); color: white; border-color: var(--warning); }

        /* Метеокарта */
        .map-container {
            border-radius: calc(var(--r-large) - 5px);
            overflow: hidden;
            border: 3px solid var(--accent-craft);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
        }

        /* Таймер */
        .pomodoro-settings {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            background: var(--bg-main);
            padding: 15px;
            border-radius: var(--r-pill);
            max-width: 350px;
            margin-left: auto;
            margin-right: auto;
        }

        .pomodoro-settings input {
            width: 100px;
            text-align: center;
            font-family: 'Caveat', cursive;
            font-size: 1.8rem;
            padding: 8px;
            border-color: #e6e6ee;
        }

        .pomodoro-display {
            font-size: 6rem;
            font-weight: 300;
            text-align: center;
            margin: 10px 0 35px;
            font-variant-numeric: tabular-nums;
            color: var(--text-main);
            letter-spacing: -3px;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.03);
        }

        .btn-group { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }

        /* Задачи */
        .task-controls {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr auto;
            gap: 15px;
            margin-bottom: 35px;
            background: var(--bg-main);
            padding: 20px;
            border-radius: var(--r-medium);
        }

        .task-list {
            list-style: none;
            max-height: 450px;
            overflow-y: auto;
            padding-right: 15px;
        }

        .task-item {
            background: var(--bg-main);
            border: 2px solid #f1f1f8;
            padding: 25px;
            margin-bottom: 15px;
            /* Скругление задач */
            border-radius: var(--r-medium);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            transition: var(--transition-micro);
        }

        .task-item:hover {
            transform: translateX(10px);
            background: var(--bg-card);
            box-shadow: var(--shadow-soft);
            border-color: transparent;
        }

        .task-priority-high { border-left: 6px solid var(--danger); }
        .task-priority-medium { border-left: 6px solid var(--warning); }
        .task-priority-low { border-left: 6px solid var(--success); }

        .task-info { flex-grow: 1; }
        .task-title { font-weight: 600; font-size: 1.2rem; margin-bottom: 8px; transition: var(--transition-micro); }
        .task-meta { font-size: 0.9rem; color: var(--text-muted); background: #eee; display: inline-block; padding: 3px 10px; border-radius: var(--r-pill); }

        .task-completed {
            opacity: 0.5;
            background: #f8f8f8 !important;
            border-color: #eee !important;
            transform: scale(0.98);
        }
        .task-completed .task-title { text-decoration: line-through; color: var(--text-muted); }
        .task-completed .task-meta { background: #e0e0e0; }
        .task-completed:hover { transform: scale(0.98); }

        .task-actions { display: flex; gap: 10px; }
        .task-actions button { padding: 0; font-size: 1.1rem; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; }

        /* Форма наблюдений (Столбик) */
        .form-column {
            display: flex;
            flex-direction: column;
            gap: 25px;
            max-width: 800px;
            margin: 0 auto;
            background: var(--bg-main);
            padding: 30px;
            border-radius: var(--r-large);
        }

        .form-group { display: flex; flex-direction: column; gap: 10px; }
        .form-group label {
            font-family: 'Caveat', cursive;
            font-size: 1.6rem;
            color: var(--text-main);
            margin-left: 15px;
        }

        .form-group input[readonly] {
            background: transparent;
            border: none;
            border-bottom: 3px dashed var(--accent-craft);
            border-radius: 0;
            color: var(--text-muted);
            font-family: 'Caveat', cursive;
            font-size: 1.4rem;
            padding-left: 15px;
            font-weight: 700;
        }

        .submit-btn {
            margin-top: 25px;
            background: var(--text-main);
            color: var(--bg-card);
            font-size: 1.2rem;
            padding: 18px;
            width: 100%;
            border-color: var(--text-main);
        }
        .submit-btn:hover { background: #666; color: white; border-color: #666; }

        footer {
            text-align: center;
            padding: 50px 20px 10px;
            font-family: 'Caveat', cursive;
            font-size: 1.4rem;
            color: var(--text-muted);
        }

        /* Кастомный скроллбар */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--accent-craft); border-radius: var(--r-pill); }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-hover); }

        /* Адаптивность */
        @media (max-width: 1100px) {
            .task-controls { grid-template-columns: 1fr 1fr; }
            .task-controls button { grid-column: 1 / -1; }
        }
        @media (max-width: 768px) {
            main { grid-template-columns: 1fr; gap: 30px; }
            section { padding: 30px; }
            .task-controls { grid-template-columns: 1fr; padding: 15px; }
            header { flex-direction: column; text-align: center; gap: 20px; padding-top: 20px; }
            .pomodoro-display { font-size: 4.5rem; }
            .task-item { flex-direction: column; align-items: flex-start; gap: 15px; }
            .task-actions { width: 100%; justify-content: flex-end; }
            .form-column { padding: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <span class="logo-wf">WF</span>
            <span class="logo-text">Manager</span>
        </div>
        <div class="version">v 5.3</div>
    </header>

    <main>
        <section>
            <h2>Метеокарта</h2>
            <div class="map-container">
                <iframe width="100%" height="900" src="https://embed.windy.com/embed.html?type=map&location=coordinates&metricRain=mm&metricTemp=°C&metricWind=m/s&zoom=5&overlay=wind&product=ecmwf&level=surface" frameborder="0"></iframe>
            </div>
        </section>

        <section>
            <h2>Таймер Pomodoro</h2>
            <div class="pomodoro-settings">
                <input type="number" id="pomodoro-input" value="25" min="1" max="120" title="Минуты">
                <button onclick="setCustomTime()">Задать время</button>
            </div>
            <div class="pomodoro-display" id="timer-display">25:00</div>
            <div class="btn-group">
                <button onclick="startTimer()">Старт</button>
                <button onclick="pauseTimer()">Пауза</button>
                <button class="btn-danger" onclick="resetTimer()">Сброс</button>
            </div>
        </section>

        <section>
            <h2>Задачи</h2>
            <div class="task-controls">
                <input type="text" id="task-name" placeholder="Что нужно сделать?">
                <select id="task-priority">
                    <option value="low">Низкий приоритет</option>
                    <option value="medium">Средний приоритет</option>
                    <option value="high">Высокий приоритет</option>
                </select>
                <input type="text" id="task-dep" placeholder="Зависит от...">
                <input type="date" id="task-deadline">
                <button onclick="addTask()">Добавить</button>
            </div>
            <ul class="task-list" id="task-list"></ul>
        </section>

        <section>
            <h2>Бланк наблюдений</h2>
            <form action="https://formsubmit.co/communityofdevelopingcraftsmen@gmail.com" method="POST" class="form-column">
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_subject" value="Новый бланк наблюдений WF Manager">
                
                <div class="form-group">
                    <label>Дата</label>
                    <input type="text" name="Дата" id="auto-date" readonly required>
                </div>
                <div class="form-group">
                    <label>Время</label>
                    <input type="text" name="Время" id="auto-time" readonly required>
                </div>
                <div class="form-group">
                    <label>Микрорайон</label>
                    <input type="text" name="Микрорайон" placeholder="Введите микрорайон" required>
                </div>
				<div class="form-group">
                    <label>Температура (°C)</label>
                    <input type="text" name="Температура" placeholder="Введите температуру">
                </div>
				<div class="form-group">
                    <label>Ветер (км/ч)</label>
                    <input type="text" name="Ветер" placeholder="Ввдите ветер" oninput="restrictInput(this)" required>
                </div>
				<div class="form-group">
                    <label>Облака (%)</label>
                    <input type="text" name="Облака" placeholder="Введите проценты облаков" oninput="restrictInput(this)" required>
                </div>
				<div class="form-group">
                    <label>Тип осадков (mm)</label>
                    <input type="text" name="Тип осадков" placeholder="Введите тип осадков" oninput="restrictInput(this)" required>
                </div>
				<div class="form-group">
                    <label>Точка росы (°C)</label>
                    <input type="text" name="Точка росы" placeholder="Введите точку росы">
                </div>
                <div class="form-group">
                    <label>Влажность (%)</label>
                    <input type="text" name="Влажность" placeholder="Введите влажность" oninput="restrictInput(this)" required>
                </div>
				<div class="form-group">
                    <label>Ультрафиолетовый индекс</label>
                    <select name="Погода" required>
                        <option value="" disabled selected>Выберите тип индекса</option>
                        <option value="Ясно">Низкий</option>
                        <option value="Засуха">Умеренный</option>
                        <option value="Туман">Высокий</option>
                        <option value="Облачно">Очень высокий</option>
                        <option value="Пасмурно">Экстремальный</option>
                    </select>
                </div>
				<div class="form-group">
                    <label>Туман</label>
                    <input type="text" name="Туман" placeholder="Введите тип тумана">
                </div>
				<div class="form-group">
                    <label>Видимость (км)</label>
                    <input type="text" name="Видимость" placeholder="Введите видимость" oninput="restrictInput(this)" required>
                </div>
				<div class="form-group">
                    <label>Индекс CAPE (J/kg)</label>
                    <input type="text" name="Индекс CAPE" placeholder="Введите индекс" oninput="restrictInput(this)" required>
                </div>
				<div class="form-group">
                    <label>NO2 (mg/m3)</label>
                    <input type="text" name="NO2" placeholder="Введите NO2" oninput="restrictInput(this)" required>
                </div>
				<div class="form-group">
                    <label>Озоновый слой (DU)</label>
                    <input type="text" name="Озоновый слой" placeholder="Введите озоновый слой" oninput="restrictInput(this)" required>
                </div>
				<div class="form-group">
                    <label>Концетрация CO (ppbv)</label>
                    <input type="text" name="Концетрация CO" placeholder="Введите концетрацию CO" oninput="restrictInput(this)" required>
                </div>
                <div class="form-group">
                    <label>Выполняет работу (ФИО)</label>
                    <input type="text" name="Исполнитель" placeholder="Введите имя">
                </div>
                <div class="form-group">
                    <label>Устройство</label>
                    <select name="Устройство" required>
                        <option value="" disabled selected>Выберите устройство</option>
                        <option value="Смартфон">Смартфон</option>
                        <option value="Планшет">Планшет</option>
                        <option value="Компьютер">Компьютер</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn">Отправить бланк</button>
            </form>
        </section>
    </main>

    <footer>© Все права защищены</footer>

    <script>
        // --- 1. Таймер Pomodoro ---
        let timerInterval;
        let defaultTime = 25 * 60;
        let timeLeft = defaultTime;
        let isRunning = false;
        const display = document.getElementById('timer-display');

        function updateDisplay() {
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            display.textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function setCustomTime() {
            if (isRunning) return alert('Поставьте таймер на паузу!');
            const min = parseInt(document.getElementById('pomodoro-input').value);
            if (min > 0) {
                defaultTime = min * 60;
                timeLeft = defaultTime;
                updateDisplay();
            }
        }

        function startTimer() {
            if (!isRunning) {
                isRunning = true;
                timerInterval = setInterval(() => {
                    if (timeLeft > 0) { timeLeft--; updateDisplay(); } 
                    else { clearInterval(timerInterval); isRunning = false; alert('Время вышло! Пора отдохнуть.'); }
                }, 1000);
            }
        }

        function pauseTimer() { clearInterval(timerInterval); isRunning = false; }
        function resetTimer() { clearInterval(timerInterval); isRunning = false; timeLeft = defaultTime; updateDisplay(); }
        updateDisplay();

        // --- 2. Менеджер задач ---
        function addTask() {
            const nameInput = document.getElementById('task-name');
            const priority = document.getElementById('task-priority').value;
            const depInput = document.getElementById('task-dep');
            const deadlineInput = document.getElementById('task-deadline');
            
            if (!nameInput.value.trim()) return alert('Введите название задачи!');

            const li = document.createElement('li');
            li.className = `task-item task-priority-${priority}`;
            
            let metaInfo = [];
            const prioMap = {high: 'Высокий', medium: 'Средний', low: 'Низкий'};
            metaInfo.push(`Приоритет: ${prioMap[priority]}`);
            
            if (depInput.value.trim()) metaInfo.push(`От: ${depInput.value.trim()}`);
            if (deadlineInput.value) metaInfo.push(`До: ${new Date(deadlineInput.value).toLocaleDateString('ru-RU')}`);
            
            li.innerHTML = `
                <div class="task-info">
                    <div class="task-title">${nameInput.value.trim()}</div>
                    <div class="task-meta">${metaInfo.join(' | ')}</div>
                </div>
                <div class="task-actions">
                    <button class="btn-success" onclick="this.closest('.task-item').classList.toggle('task-completed')" title="Готово">✓</button>
                    <button class="btn-edit" onclick="editTask(this)" title="Правка">✎</button>
                    <button class="btn-danger" onclick="this.closest('.task-item').remove()" title="Удалить">✕</button>
                </div>
            `;
            
            document.getElementById('task-list').prepend(li);
            nameInput.value = ''; depInput.value = ''; deadlineInput.value = '';
        }

        function editTask(btn) {
            const titleEl = btn.closest('.task-item').querySelector('.task-title');
            const newName = prompt('Изменить название задачи:', titleEl.innerText);
            if (newName && newName.trim()) titleEl.innerText = newName.trim();
        }

        // --- 3. Бланк наблюдений ---
        function updateDateTime() {
            const now = new Date();
            document.getElementById('auto-date').value = now.toLocaleDateString('ru-RU');
            document.getElementById('auto-time').value = now.toLocaleTimeString('ru-RU');
        }
        updateDateTime();
        setInterval(updateDateTime, 1000);

        function restrictInput(el) { el.value = el.value.replace(/[^0-9.,;:]/g, ''); }
    </script>
</body>
</html>
